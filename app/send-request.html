<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>POST JSON to /auth</title>
</head>
<body>
  <h2>Login Form</h2>

  <form id="loginForm">
    <label for="username">Username:</label>
    <input type="text" id="username" name="username" value="john" required><br><br>

    <label for="password">Password:</label>
    <input type="password" id="password" name="password" value="1234" required><br><br>

    <button type="submit">Submit</button>
  </form>

  <script>
    const form = document.getElementById('loginForm');

    form.addEventListener('submit', async function(event) {
      event.preventDefault();

      const data = {
        username: form.username.value,
        password: form.password.value
      };

      try {
        const response = await fetch('http://localhost:8083/auth', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(data)
        });

        if (response.ok) {
          window.location.href = "/user";
        } else {
          const errorData = await response.json();
          alert("Login failed: " + (errorData.error || "Unknown error"));
        }
      } catch (error) {
        console.error('Error sending JSON:', error);
        alert('Error sending JSON. Check console.');
      }
    });
  </script>
</body>
</html>
